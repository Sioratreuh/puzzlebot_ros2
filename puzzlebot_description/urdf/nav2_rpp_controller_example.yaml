
controller_server:
  ros__parameters:
    use_sim_time: False
    controller_frequency: 10.0
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.5 #relevant
    min_theta_velocity_threshold: 0.001
    failure_tolerance: 0.3 #relevant
    progress_checker_plugin: "progress_checker"
    goal_checker_plugins: ["general_goal_checker"]
    controller_plugins: ["FollowPath"]
  progress_checker:
    plugin: "nav2_controller::SimpleProgressChecker"
    required_movement_radius: 0.5 #relevant
    movement_time_allowance: 10.0 #relevant
  general_goal_checker:
    stateful: True
    plugin: "nav2_controller::SimpleGoalChecker"
    xy_goal_tolerance: 0.25 #relevant
    yaw_goal_tolerance: 0.25 #relevant
  FollowPath:
    plugin: "nav2_regulated_pure_pursuit_controller::RegulatedPurePursuitController" #relevant
    desired_linear_vel: 0.22 #relevant
    min_approach_linear_velocity: 0.05 #relevant
    lookahead_dist: 0.24 #relevant
    min_lookahead_dist: 0.18 #relevant
    max_lookahead_dist: 0.40 #relevant
    lookahead_time: 1.2 #relevant
    use_velocity_scaled_lookahead_dist: true
    rotate_to_heading_angular_vel: 0.60 #relevant
    transform_tolerance: 0.2
    use_regulated_linear_velocity_scaling: true
    use_cost_regulated_linear_velocity_scaling: false #relevant
    regulated_linear_scaling_min_radius: 0.90 #relevant
    regulated_linear_scaling_min_speed: 0.06
    use_fixed_curvature_lookahead: false
    curvature_lookahead_dist: 0.25
    use_collision_detection: true
    max_allowed_time_to_collision_up_to_carrot: 1.00 #relevant
    use_rotate_to_heading: true
    rotate_to_heading_min_angle: 0.70 #relevant
    allow_reversing: false
    max_robot_pose_search_dist: 10.0
    interpolate_curvature_after_goal: false

slam_toolbox:
  ros__parameters:
    use_sim_time: true
    mode: mapping  # Generate map in real-time
    map_frame: map
    odom_frame: odom
    base_frame: base_footprint
    scan_topic: /scan  # Subscribe to laser scan
    transform_publish_period: 0.05  # Publish TF at 20 Hz
    map_update_interval: 1.0  # Update map every 1 second (avoid lag)
    resolution: 0.05  # 5cm grid cells
    max_laser_range: 12.0  # Max scan range
    minimum_time_interval: 0.5  # Min time between updates
    tf_buffer_duration: 30.0  # TF buffer duration
    enable_interactive_mode: true  # Allow manual pose corrections
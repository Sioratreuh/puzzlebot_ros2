# Nav2 parameters for real robot with tuning adjustments
amcl:
  ros__parameters:
    use_sim_time: false
    # Motion model noise parameters (encoder uncertainty)
    alpha1: 0.05
    alpha2: 0.05
    alpha3: 0.05
    alpha4: 0.05
    alpha5: 0.02
    base_frame_id: "base_footprint"
    # Laser beam skipping
    beam_skip_distance: 0.5
    beam_skip_error_threshold: 0.9
    beam_skip_threshold: 0.3
    do_beamskip: false
    global_frame_id: "map"
    lambda_short: 0.1
    laser_likelihood_max_dist: 2.0
    laser_max_range: 4.0
    laser_min_range: 0.15
    laser_model_type: "likelihood_field"
    max_beams: 120
    max_particles: 1000  #
    min_particles: 300  #
    odom_frame_id: "odom"
    pf_err: 0.05
    pf_z: 0.99
    recovery_alpha_fast: 0.0
    recovery_alpha_slow: 0.0
    resample_interval: 1
    robot_model_type: "nav2_amcl::DifferentialMotionModel"
    save_pose_rate: 0.2
    sigma_hit: 0.2
    tf_broadcast: true
    transform_tolerance: 0.5
    update_min_a: 0.02  # Near to zero
    update_min_d: 0.02  # Near to zero
    z_hit: 0.6
    z_max: 0.05
    z_rand: 0.3
    z_short: 0.05
    scan_topic: scan
    map_topic: map
    set_initial_pose: false
    always_reset_initial_pose: true
    first_map_only: false
    initial_pose:
      x: 1.35
      y: 0.0
      z: 0.0
      yaw: -1.57

bt_navigator:
  ros__parameters:
    use_sim_time: false
    global_frame: map
    odom_topic: odom
    robot_base_frame: base_footprint
    transform_tolerance: 1.0  # Due latencies in the real robot, original 0.5
    filter_duration: 0.3
    always_reload_bt_xml: false
    goal_blackboard_id: goal
    goals_blackboard_id: goals
    path_blackboard_id: path
    navigators: ['navigate_to_pose', 'navigate_through_poses']
    navigate_to_pose:
      plugin: "nav2_bt_navigator::NavigateToPoseNavigator"
    navigate_through_poses:
      plugin: "nav2_bt_navigator::NavigateThroughPosesNavigator"


controller_server:
  ros__parameters: 
    use_sim_time: false
    controller_frequency: 10.0
    # Velocity thresholds for differential drive
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.001
    min_theta_velocity_threshold: 0.001
    failure_tolerance: 0.3
    progress_checker_plugin: "progress_checker"
    goal_checker_plugins: ["goal_checker"]
    controller_plugins: ["FollowPath"]

    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.1
      movement_time_allowance: 10.0

    goal_checker:
      stateful: true
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.10
      yaw_goal_tolerance: 0.15

    # Regulated Pure Pursuit path follower
    FollowPath:
      plugin: "nav2_regulated_pure_pursuit_controller::RegulatedPurePursuitController"
      desired_linear_vel: 0.10
      min_approach_linear_velocity: 0.025
      lookahead_dist: 0.15
      min_lookahead_dist: 0.10
      max_lookahead_dist: 0.30
      lookahead_time: 1.2
      use_velocity_scaled_lookahead_dist: true
      rotate_to_heading_angular_vel: 0.20
      transform_tolerance: 0.2
      use_regulated_linear_velocity_scaling: true
      use_cost_regulated_linear_velocity_scaling: true  # Relevant for RPP
      regulated_linear_scaling_min_radius: 0.30  # Reduce velocity when curvature is high, original 0.9
      regulated_linear_scaling_min_speed: 0.06
      use_fixed_curvature_lookahead: false
      curvature_lookahead_dist: 0.25
      use_collision_detection: true
      max_allowed_time_to_collision_up_to_carrot: 0.3
      use_rotate_to_heading: true
      rotate_to_heading_min_angle: 0.40  # Makes the robot rotate in place when the angle to the next waypoint is higher than this value, original 0.40
      allow_reversing: false
      max_robot_pose_search_dist: 10.0
      interpolate_curvature_after_goal: false
    enable_stamped_cmd_vel: true

local_costmap:
  local_costmap:
    ros__parameters:
      use_sim_time: false
      transform_tolerance: 0.5
      update_frequency: 10.0
      publish_frequency: 10.0
      global_frame: odom
      robot_base_frame: base_footprint
      rolling_window: true
      width: 1
      height: 1
      resolution: 0.05
      # Puzzlebot footprint
      footprint: "[[0.10, 0.10], [0.10, -0.10], [-0.11, -0.10], [-0.11, 0.10]]"
      plugins: ["obstacle_layer", "inflation_layer"]
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        inflation_radius: 0.16  # Original 0.25
        cost_scaling_factor: 10.0  # Original 5.0
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        observation_sources: scan
        scan:
          topic: /scan
          max_obstacle_height: 2.0
          clearing: true
          marking: true
          data_type: "LaserScan"
          observation_persistence: 0.5
          raytrace_max_range: 3.0
          raytrace_min_range: 0.0
          obstacle_max_range: 2.5
          obstacle_min_range: 0.10
      static_layer:
        map_subscribe_transient_local: true
      always_send_full_costmap: true

global_costmap:
  global_costmap:
    ros__parameters:
      use_sim_time: false
      update_frequency: 1.0
      publish_frequency: 5.0
      global_frame: map
      robot_base_frame: base_footprint
      transform_tolerance: 0.5
      # Puzzlebot footprint
      footprint: "[[0.10, 0.10], [0.10, -0.10], [-0.11, -0.10], [-0.11, 0.10]]"
      resolution: 0.05
      track_unknown_space: true
      plugins: ["static_layer", "obstacle_layer", "inflation_layer"]
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        observation_sources: scan
        scan:
          topic: /scan
          max_obstacle_height: 0.5
          clearing: true
          marking: true
          data_type: "LaserScan"
          raytrace_max_range: 3.0
          raytrace_min_range: 0.0
          obstacle_max_range: 2.5
          obstacle_min_range: 0.10
      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: true
        transform_tolerance: 0.1
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        inflation_radius: 0.12  # Original 0.25
        cost_scaling_factor: 10.0  # Original 5.0
      always_send_full_costmap: true

map_server:
  ros__parameters:
    use_sim_time: false
    yaml_filename: "map.yaml"

map_saver:
  ros__parameters:
    use_sim_time: false
    save_map_timeout: 5.0
    free_thresh_default: 0.25
    occupied_thresh_default: 0.65
    map_subscribe_transient_local: true

# Path planner
planner_server:
  ros__parameters:
    use_sim_time: false
    expected_planner_frequency: 10.0
    planner_plugins: ["GridBased"]
    GridBased:
      plugin: "nav2_navfn_planner/NavfnPlanner"
      tolerance: 0.05  # makes the planner consider the goal reached when it is within this distance from the goal, original 0.05
      use_astar: false
      allow_unknown: false  # Allows the planner to plan through unknown space, which can be useful in some cases, but can also lead to unsafe plans if the robot is not careful. Set to true for better performance in puzzlebot, original false

# Behavior server for recovery actions
behavior_server:
  ros__parameters:
    use_sim_time: false
    local_costmap_topic: local_costmap/costmap_raw
    local_footprint_topic: local_costmap/published_footprint
    global_costmap_topic: global_costmap/costmap_raw
    global_footprint_topic: global_costmap/published_footprint
    cycle_frequency: 10.0
    behavior_plugins: ["spin", "backup", "wait"]
    spin:
      plugin: "nav2_behaviors/Spin"
    backup:
      plugin: "nav2_behaviors/BackUp"
    wait:
      plugin: "nav2_behaviors/Wait"
    local_frame: odom
    global_frame: map
    robot_base_frame: base_footprint
    transform_timeout: 0.1
    simulate_ahead_time: 2.0
    max_rotational_vel: 1.0
    min_rotational_vel: 0.4
    rotational_acc_lim: 3.2
    enable_stamped_cmd_vel: true

# Waypoint following
waypoint_follower:
  ros__parameters:
    use_sim_time: false
    loop_rate: 20
    stop_on_failure: false
    waypoint_task_executor_plugin: "wait_at_waypoint"
    wait_at_waypoint:
      plugin: "nav2_waypoint_follower::WaitAtWaypoint"
      enabled: true
      waypoint_pause_duration: 200

